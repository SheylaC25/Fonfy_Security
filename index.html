<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi App</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:       #040810;
      --card:     #0d1628;
      --card2:    #111d35;
      --cyan:     #00e5ff;
      --blue:     #2979ff;
      --green:    #00e676;
      --orange:   #ff9100;
      --red:      #ff1744;
      --txt:      #e8f0fe;
      --txt2:     #8fa8c8;
      --border:   rgba(0,229,255,0.15);
      --glow:     0 0 20px rgba(0,229,255,0.35);
      --fd:       'Orbitron', monospace;
      --fb:       'Exo 2', sans-serif;
    }

    body {
      font-family: var(--fb);
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events:none; 
      z-index:0;
    }

    .wrap {
      position:relative; 
      z-index:1;
      width:100%; 
      max-width:400px;
      padding: 32px 24px 48px;
      background: linear-gradient(145deg, var(--card), var(--card2));
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--glow);
      text-align: center;
    }

    h1 {
      font-family: var(--fd);
      color: var(--cyan);
      margin-bottom: 10px;
      text-shadow: 0 0 10px rgba(0,229,255,0.7);
    }

    p {
      color: var(--txt2);
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      color: #000;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
      box-shadow: 0 0 10px rgba(0,229,255,0.5);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0,229,255,0.9);
    }

  </style>
</head>
<body>

  <div class="wrap">
    <h1>FONFY SECURITY</h1>
    <p>Sistema de vigilancia inteligente</p>

    <a href="login.html" class="btn">Iniciar Sesión</a>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>

</body>
</html>
