<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#040810">
<title>FONFY SECURITY — Registro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#040810; --card:#0d1628; --card2:#111d35;
  --cyan:#00e5ff; --blue:#2979ff; --green:#00e676;
  --orange:#ff9100; --red:#ff1744;
  --txt:#e8f0fe; --txt2:#8fa8c8; --border:rgba(0,229,255,0.15);
  --glow:0 0 20px rgba(0,229,255,0.35);
  --fd:'Orbitron',monospace; --fb:'Exo 2',sans-serif;
}
body { font-family:var(--fb); background:var(--bg); color:var(--txt); min-height:100vh; display:flex; align-items:flex-start; justify-content:center; overflow-x:hidden; padding-bottom:40px; }
body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
.wrap { position:relative; z-index:1; width:100%; max-width:400px; padding:32px 24px 48px; }
.header { display:flex; flex-direction:column; align-items:center; gap:6px; margin-bottom:28px; text-align:center; }
.shield { font-size:2.8rem; filter:drop-shadow(0 0 14px rgba(0,229,255,0.5)); }
.logo { font-family:var(--fd); font-size:2.2rem; font-weight:900; color:var(--cyan); text-shadow:var(--glow); letter-spacing:5px; }
.logo-sub { font-size:0.68rem; color:var(--txt2); letter-spacing:3px; text-transform:uppercase; }
.page-title { font-family:var(--fd); font-size:1rem; font-weight:700; color:var(--txt); letter-spacing:2px; margin-top:16px; }
.page-sub { font-size:0.8rem; color:var(--txt2); margin-top:4px; }
.field { margin-bottom:14px; position:relative; }
.label { display:block; font-size:0.68rem; font-weight:700; color:var(--txt2); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:7px; }
.inp { width:100%; background:var(--card2); border:1.5px solid var(--border); border-radius:12px; padding:13px 44px 13px 44px; color:var(--txt); font-family:var(--fb); font-size:0.95rem; outline:none; transition:border-color .2s,box-shadow .2s; -webkit-appearance:none; }
.inp:focus { border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,229,255,0.1); }
.inp::placeholder { color:rgba(143,168,200,0.4); }
.ico { position:absolute; left:14px; bottom:13px; font-size:1rem; pointer-events:none; }
.eye { position:absolute; right:12px; bottom:10px; background:none; border:none; cursor:pointer; color:var(--txt2); font-size:1rem; padding:4px; }
/* strength bar */
.bars { display:flex; gap:4px; margin-top:6px; }
.bar { height:3px; flex:1; border-radius:2px; background:rgba(255,255,255,0.08); transition:background .3s; }
.bar.w { background:var(--red); }
.bar.m { background:var(--orange); }
.bar.s { background:var(--green); }
.str-lbl { font-size:0.67rem; color:var(--txt2); margin-top:3px; }
/* error */
.error-box { background:rgba(255,23,68,0.1); border:1px solid rgba(255,23,68,0.35); border-radius:10px; padding:10px 14px; font-size:0.8rem; color:var(--red); margin-bottom:12px; display:none; align-items:center; gap:8px; }
.error-box.show { display:flex; }
/* buttons */
.btn-main { width:100%; padding:15px; background:linear-gradient(135deg,var(--blue),var(--cyan)); border:none; border-radius:14px; color:#040810; font-family:var(--fd); font-size:0.88rem; font-weight:900; letter-spacing:2px; cursor:pointer; transition:all .2s; box-shadow:0 4px 20px rgba(0,229,255,0.25); display:flex; align-items:center; justify-content:center; gap:8px; }
.btn-main:active { transform:scale(0.97); }
.btn-main:disabled { opacity:0.5; pointer-events:none; }
.terms { font-size:0.71rem; color:var(--txt2); text-align:center; line-height:1.6; margin-top:10px; }
.terms span { color:var(--cyan); }
.switch { text-align:center; font-size:0.82rem; color:var(--txt2); margin-top:20px; }
.link { color:var(--cyan); font-weight:700; cursor:pointer; background:none; border:none; font-family:var(--fb); font-size:0.82rem; text-decoration:underline; }
.spin { width:16px; height:16px; border:2px solid rgba(4,8,16,0.25); border-top-color:#040810; border-radius:50%; animation:rot .7s linear infinite; }
@keyframes rot { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="shield">🛡️</div>
    <div class="logo">FONFY</div>
    <div class="logo-sub">SECURITY · LA PAZ</div>
    <div class="page-title">CREAR CUENTA</div>
    <div class="page-sub">Únete a la red de seguridad ciudadana</div>
  </div>

  <div class="field">
    <label class="label">Nombre de Usuario</label>
    <span class="ico">👤</span>
    <input id="username" class="inp" type="text" placeholder="ej: juan_paz" autocomplete="username" oninput="this.value=this.value.replace(/[^a-zA-Z0-9_]/g,'').toLowerCase()">
  </div>

  <div class="field">
    <label class="label">Correo Gmail</label>
    <span class="ico">📧</span>
    <input id="email" class="inp" type="email" placeholder="tucorreo@gmail.com" autocomplete="email">
  </div>

  <div class="field">
    <label class="label">Contraseña</label>
    <span class="ico">🔑</span>
    <input id="pwd" class="inp" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" oninput="checkStrength(this.value)" style="padding-right:44px">
    <button class="eye" type="button" onclick="toggleEye('pwd',this)">👁️</button>
    <div class="bars">
      <div class="bar" id="b1"></div>
      <div class="bar" id="b2"></div>
      <div class="bar" id="b3"></div>
      <div class="bar" id="b4"></div>
    </div>
    <div class="str-lbl" id="str-lbl">Ingresa una contraseña</div>
  </div>

  <div class="field">
    <label class="label">Confirmar Contraseña</label>
    <span class="ico">🔒</span>
    <input id="pwd2" class="inp" type="password" placeholder="Repite tu contraseña" autocomplete="new-password" style="padding-right:44px">
    <button class="eye" type="button" onclick="toggleEye('pwd2',this)">👁️</button>
  </div>

  <div class="error-box" id="err">⚠️ <span id="err-msg"></span></div>

  <button class="btn-main" id="btn-reg" onclick="doRegister()">
    CREAR CUENTA
  </button>

  <div class="terms">
    Al registrarte aceptas los <span>Términos de Uso</span> y la <span>Política de Privacidad</span> de FONFY Security.
  </div>

  <div class="switch">
    ¿Ya tienes cuenta? <button class="link" onclick="window.location.href='login.html'">Inicia sesión</button>
  </div>
</div>

<script>
function toggleEye(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
}

function checkStrength(pwd) {
  const bars = [document.getElementById('b1'), document.getElementById('b2'), document.getElementById('b3'), document.getElementById('b4')];
  const lbl = document.getElementById('str-lbl');
  bars.forEach(b => b.className = 'bar');
  if (!pwd) { lbl.textContent = 'Ingresa una contraseña'; lbl.style.color = 'var(--txt2)'; return; }
  let score = 0;
  if (pwd.length >= 8) score++;
  if (/[A-Z]/.test(pwd)) score++;
  if (/[0-9]/.test(pwd)) score++;
  if (/[^A-Za-z0-9]/.test(pwd)) score++;
  const cls = ['','w','m','m','s'];
  const labels = ['','Débil','Aceptable','Buena','Fuerte ✓'];
  const colors = ['','var(--red)','var(--orange)','var(--orange)','var(--green)'];
  for (let i = 0; i < score; i++) bars[i].className = 'bar ' + cls[score];
  lbl.textContent = labels[score] || '';
  lbl.style.color = colors[score] || 'var(--txt2)';
}

function showErr(msg) {
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('err').classList.add('show');
}
function hideErr() { document.getElementById('err').classList.remove('show'); }

function doRegister() {
  hideErr();
  const username = document.getElementById('username').value.trim();
  const email    = document.getElementById('email').value.trim().toLowerCase();
  const pwd      = document.getElementById('pwd').value;
  const pwd2     = document.getElementById('pwd2').value;

  if (!username || username.length < 3) { showErr('El usuario debe tener al menos 3 caracteres'); return; }
  if (!email || !email.includes('@')) { showErr('Ingresa un correo válido'); return; }
  if (pwd.length < 8) { showErr('La contraseña debe tener al menos 8 caracteres'); return; }
  if (pwd !== pwd2) { showErr('Las contraseñas no coinciden'); return; }

  // Check if email already exists
  const accounts = JSON.parse(localStorage.getItem('fonfy_accounts') || '{}');
  if (accounts[email]) { showErr('Este correo ya está registrado'); return; }
  const userExists = Object.values(accounts).find(a => a.username === username);
  if (userExists) { showErr('Este nombre de usuario ya está en uso'); return; }

  const btn = document.getElementById('btn-reg');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> ENVIANDO CÓDIGO...';

  // Generate 6-digit code
  const code = String(Math.floor(100000 + Math.random() * 900000));

  // Save pending data
  localStorage.setItem('fonfy_pending', JSON.stringify({ username, email, password: pwd, code, expires: Date.now() + 600000 }));

  // Simulate email (in production: call your backend here)
  console.log('[FONFY] Código de verificación para', email, ':', code);

  setTimeout(() => {
    // Show code in alert for demo purposes
    alert('📧 DEMO — Código enviado a: ' + email + '\n\nCódigo de verificación: ' + code + '\n\n(En producción esto llega por correo real)');
    window.location.href = 'verify.html';
  }, 1200);
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
