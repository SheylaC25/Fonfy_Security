<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#040810">
<title>FONFY SECURITY — Verificación</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#040810; --card:#0d1628; --card2:#111d35;
  --cyan:#00e5ff; --blue:#2979ff; --green:#00e676;
  --orange:#ff9100; --red:#ff1744;
  --txt:#e8f0fe; --txt2:#8fa8c8; --border:rgba(0,229,255,0.15);
  --glow:0 0 20px rgba(0,229,255,0.35);
  --fd:'Orbitron',monospace; --fb:'Exo 2',sans-serif;
}
body { font-family:var(--fb); background:var(--bg); color:var(--txt); min-height:100vh; display:flex; align-items:center; justify-content:center; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
.wrap { position:relative; z-index:1; width:100%; max-width:400px; padding:32px 24px 48px; }
.header { display:flex; flex-direction:column; align-items:center; gap:6px; margin-bottom:28px; text-align:center; }
.mail-icon { font-size:3rem; filter:drop-shadow(0 0 14px rgba(0,229,255,0.5)); }
.logo { font-family:var(--fd); font-size:1.8rem; font-weight:900; color:var(--cyan); text-shadow:var(--glow); letter-spacing:5px; }
.page-title { font-family:var(--fd); font-size:1rem; font-weight:700; color:var(--txt); letter-spacing:2px; margin-top:16px; }
.page-sub { font-size:0.8rem; color:var(--txt2); margin-top:4px; line-height:1.6; }
.email-box { background:rgba(0,229,255,0.06); border:1px solid rgba(0,229,255,0.2); border-radius:12px; padding:12px 16px; font-size:0.85rem; color:var(--cyan); text-align:center; margin:16px 0 24px; word-break:break-all; font-weight:600; }
.code-row { display:flex; gap:10px; justify-content:center; margin:0 0 10px; }
.digit { width:50px; height:60px; background:var(--card2); border:2px solid var(--border); border-radius:12px; color:var(--cyan); font-family:var(--fd); font-size:1.5rem; font-weight:900; text-align:center; outline:none; transition:all .2s; caret-color:var(--cyan); }
.digit:focus { border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,229,255,0.15); background:rgba(0,229,255,0.05); }
.digit.ok { border-color:rgba(0,229,255,0.5); background:rgba(0,229,255,0.08); }
.error-box { background:rgba(255,23,68,0.1); border:1px solid rgba(255,23,68,0.35); border-radius:10px; padding:10px 14px; font-size:0.8rem; color:var(--red); margin-bottom:12px; display:none; align-items:center; gap:8px; }
.error-box.show { display:flex; }
.btn-main { width:100%; padding:15px; background:linear-gradient(135deg,var(--blue),var(--cyan)); border:none; border-radius:14px; color:#040810; font-family:var(--fd); font-size:0.88rem; font-weight:900; letter-spacing:2px; cursor:pointer; transition:all .2s; box-shadow:0 4px 20px rgba(0,229,255,0.25); display:flex; align-items:center; justify-content:center; gap:8px; }
.btn-main:active { transform:scale(0.97); }
.btn-main:disabled { opacity:0.5; pointer-events:none; }
.btn-ghost { width:100%; padding:13px; background:transparent; border:1.5px solid var(--border); border-radius:14px; color:var(--txt2); font-family:var(--fb); font-size:0.88rem; cursor:pointer; transition:all .2s; margin-top:10px; }
.btn-ghost:active { border-color:var(--cyan); color:var(--cyan); }
.resend { text-align:center; font-size:0.8rem; color:var(--txt2); margin-top:14px; }
.resend-btn { background:none; border:none; color:var(--cyan); font-size:0.8rem; font-weight:700; cursor:pointer; font-family:var(--fb); }
.resend-btn:disabled { color:var(--txt2); cursor:default; }
.cd { color:var(--orange); font-weight:700; }
.spin { width:16px; height:16px; border:2px solid rgba(4,8,16,0.25); border-top-color:#040810; border-radius:50%; animation:rot .7s linear infinite; }
@keyframes rot { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="mail-icon">📨</div>
    <div class="logo">FONFY</div>
    <div class="page-title">VERIFICA TU CORREO</div>
    <div class="page-sub">Te enviamos un código de 6 dígitos a:</div>
  </div>

  <div class="email-box" id="email-display">cargando...</div>

  <div style="font-size:0.82rem;color:var(--txt2);text-align:center;margin-bottom:8px">Ingresa el código aquí:</div>

  <div class="code-row">
    <input class="digit" id="d0" maxlength="1" type="text" inputmode="numeric">
    <input class="digit" id="d1" maxlength="1" type="text" inputmode="numeric">
    <input class="digit" id="d2" maxlength="1" type="text" inputmode="numeric">
    <input class="digit" id="d3" maxlength="1" type="text" inputmode="numeric">
    <input class="digit" id="d4" maxlength="1" type="text" inputmode="numeric">
    <input class="digit" id="d5" maxlength="1" type="text" inputmode="numeric">
  </div>

  <div class="error-box" id="err">⚠️ <span id="err-msg">Código incorrecto, inténtalo de nuevo</span></div>

  <button class="btn-main" id="btn-v" onclick="doVerify()">VERIFICAR</button>
  <button class="btn-ghost" onclick="window.location.href='register.html'">← Volver al registro</button>

  <div class="resend">
    ¿No llegó el correo?
    <button class="resend-btn" id="resend-btn" onclick="resend()" disabled>
      Reenviar en <span class="cd" id="cd">60s</span>
    </button>
  </div>
</div>

<script>
// Load pending data
const pending = JSON.parse(localStorage.getItem('fonfy_pending') || 'null');
if (!pending) { window.location.href = 'register.html'; }
else { document.getElementById('email-display').textContent = pending.email; }

// Digit inputs wiring
const digits = [0,1,2,3,4,5].map(i => document.getElementById('d'+i));
digits.forEach((d, i) => {
  d.addEventListener('input', () => {
    const val = d.value.replace(/\D/g,'');
    d.value = val;
    d.classList.toggle('ok', val.length === 1);
    if (val && i < 5) digits[i+1].focus();
    if (digits.every(x => x.value.length === 1)) setTimeout(doVerify, 250);
  });
  d.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !d.value && i > 0) {
      digits[i-1].value = '';
      digits[i-1].classList.remove('ok');
      digits[i-1].focus();
    }
  });
  d.addEventListener('paste', e => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'');
    text.split('').slice(0,6).forEach((ch, idx) => {
      if (digits[idx]) { digits[idx].value = ch; digits[idx].classList.add('ok'); }
    });
    if (text.length >= 6) setTimeout(doVerify, 250);
  });
});

function showErr(msg) {
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('err').classList.add('show');
}
function hideErr() { document.getElementById('err').classList.remove('show'); }

function doVerify() {
  hideErr();
  const entered = digits.map(d => d.value).join('');
  if (entered.length < 6) { showErr('Ingresa los 6 dígitos del código'); return; }

  const btn = document.getElementById('btn-v');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> VERIFICANDO...';

  setTimeout(() => {
    const p = JSON.parse(localStorage.getItem('fonfy_pending') || 'null');
    if (!p) { window.location.href = 'register.html'; return; }

    if (Date.now() > p.expires) {
      btn.disabled = false; btn.textContent = 'VERIFICAR';
      showErr('El código expiró. Solicita uno nuevo.');
      return;
    }

    if (entered === p.code) {
      // Save account
      const accounts = JSON.parse(localStorage.getItem('fonfy_accounts') || '{}');
      accounts[p.email] = { username: p.username, email: p.email, password: p.password };
      localStorage.setItem('fonfy_accounts', JSON.stringify(accounts));
      // Create session
      localStorage.setItem('fonfy_session', JSON.stringify({ username: p.username, email: p.email, loginTime: Date.now() }));
      // Clear pending
      localStorage.removeItem('fonfy_pending');
      // Go to app
      window.location.href = 'app.html';
    } else {
      btn.disabled = false; btn.textContent = 'VERIFICAR';
      showErr('Código incorrecto. Inténtalo de nuevo.');
      digits.forEach(d => { d.value=''; d.classList.remove('ok'); });
      digits[0].focus();
    }
  }, 900);
}

// Countdown
let secs = 60;
const cdEl = document.getElementById('cd');
const resendBtn = document.getElementById('resend-btn');
const interval = setInterval(() => {
  secs--;
  cdEl.textContent = secs + 's';
  if (secs <= 0) {
    clearInterval(interval);
    resendBtn.disabled = false;
    resendBtn.innerHTML = 'Reenviar código';
  }
}, 1000);

function resend() {
  const p = JSON.parse(localStorage.getItem('fonfy_pending') || 'null');
  if (!p) return;
  const newCode = String(Math.floor(100000 + Math.random() * 900000));
  p.code = newCode;
  p.expires = Date.now() + 600000;
  localStorage.setItem('fonfy_pending', JSON.stringify(p));
  alert('📧 DEMO — Nuevo código para: ' + p.email + '\n\nCódigo: ' + newCode);
  digits.forEach(d => { d.value=''; d.classList.remove('ok'); });
  digits[0].focus();
  secs = 60; cdEl.textContent = '60s'; resendBtn.disabled = true;
  resendBtn.innerHTML = 'Reenviar en <span class="cd" id="cd">60s</span>';
}
</script>
</body>
</html>
